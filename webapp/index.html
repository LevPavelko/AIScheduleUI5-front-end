	<!DOCTYPE html>
	<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>OpenUI5 Todo App</title>
		<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/argon2-browser/1.18.0/argon2-bundled.min.js"></script>
		<script
			id="sap-ui-bootstrap"
			src="https://sdk.openui5.org/resources/sap-ui-core.js"
			data-sap-ui-libs="sap.m,sap.f,sap.ui.unified"
			data-sap-ui-theme="sap_horizon"
			data-sap-ui-xx-wait-for-theme="true"
			data-sap-ui-resourceroots='{
		"sap.ui.schedule": "./"
	  }'
			data-sap-ui-oninit="module:sap/ui/core/ComponentSupport"
			data-sap-ui-compatVersion="edge"
			data-sap-ui-async="true"
			data-settings='{"id": "schedule"}'>
		</script>




	</head>

	<body class="sapUiBody sapUiSizeCompact">
	<div
		data-sap-ui-component
		data-name="sap.ui.schedule"
		data-id="schedule"
		data-settings='{"id": "schedule"}'>
	</div>

	</body>
	</html>
